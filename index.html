<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>wgpu-example-go</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #2f3d6b; color: #ddd; font-family: system-ui, sans-serif; }
  body { display: flex; flex-direction: column; }
  #status { padding: 8px 12px; font-size: 13px; }
  #canvas { flex: 1 1 auto; display: block; width: 100%; height: 100%; }
  a { color: #ffb86c; }
</style>
</head>
<body>
<div id="status"></div>
<canvas id="canvas" width="1280" height="720"></canvas>

<script src="wasm_exec.js"></script>
<script>
  const status = document.getElementById('status');

  if (!navigator.gpu) {
    status.textContent = 'WebGPU is not available in this browser. Try the latest Chrome, Edge, or Safari 26+.';
  } else {
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch('main.wasm'), go.importObject)
      .then((result) => {
        // cogentcore/webgpu/jsx.BytesToJS reads wasm memory via
        // window.wasm.instance.exports.mem.buffer
        window.wasm = result;
        go.run(result.instance);
      })
      .catch((err) => {
        status.textContent = 'Failed to load wasm: ' + err;
        console.error(err);
      });
  }
</script>
</body>
</html>
